name: amgad_business_card
description: "Amgad's online business card"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.2+5

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  cupertino_icons: ^1.0.9
  go_router: ^17.3.0
  flutter_gen: ^5.14.1
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.14.1

# to use flutter gen => dart run build_runner build
# to delete conflicts => dart run build_runner build --delete-conflicting-outputs

flutter_gen:
  output: lib/src/gen/
  integrations:
    flutter_svg: true

# to use flutter native splash => dart run flutter_native_splash:create

flutter_native_splash:
  color: "#BBB2A9"
  image: assets/images/personal_image_small.jpeg
  color_dark: "#BBB2A9"
  image_dark: assets/images/personal_image_small.jpeg
  android_12:
    color: "#BBB2A9"
    image: assets/images/personal_image_small.jpeg
  fullscreen: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
